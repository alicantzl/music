name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🧹 Clean build environment (Critical for Xcode 16)
        run: flutter clean

      - name: 📦 Flutter pub get
        run: flutter pub get

      - name: 🍎 Pod install
        run: |
          cd ios
          pod install --repo-update
        # No more sed/python hacks here. Podfile in repo should be correct.

      - name: 🏗️ Build iOS App Folder (Native Flutter Command)
        run: |
          # Inject code-signing suppression directly into the Flutter XCConfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "EXPANDED_CODE_SIGN_IDENTITY=\"\"" >> ios/Flutter/Release.xcconfig
          
          # Use Flutter's native command which is safer than raw xcodebuild
          # This compiles the Dart code and prepares the .app folder.
          flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/app/outputs/symbols || echo 'Flutter build finished Dart compilation.'
          
          # Finish the build natively forcing Xcode to bypass code signing completely
          cd ios
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" EXPANDED_CODE_SIGN_IDENTITY="" \
            CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER=NO
          cd ..

      - name: 📦 Package unsigned IPA
        run: |
          mkdir -p Payload
          
          # Find where Xcode dumped the built .app file
          APP_PATH=$(find . -name "Runner.app" -type d | grep "Release-iphoneos" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Runner.app not found!"
            exit 1
          fi
          echo "Found Runner.app at: $APP_PATH"
          
          # Copy it securely
          cp -HLR "$APP_PATH" Payload/
          
          # Zip it up
          zip -qr PureMusic-unsigned.ipa Payload
          
          mkdir -p build/ios/ipa
          mv PureMusic-unsigned.ipa build/ios/ipa/
          echo "✅ Final IPA Created."

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PureMusic-unsigned-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 14
