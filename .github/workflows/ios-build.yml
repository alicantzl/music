name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Flutter pub get (Generates Podfile)
        run: flutter pub get

      - name: 🍎 Set iOS 14.0 & Disable CocoaPods Stats
        working-directory: ios
        run: |
          # The Podfile is auto-generated by flutter pub get
          # Update the platform version to iOS 14.0 (for audio_service)
          sed -i '' "s/^# platform :ios.*/platform :ios, '14.0'/g" Podfile
          # Speed up build by avoiding network syncs
          echo "ENV['COCOAPODS_DISABLE_STATS'] = 'true'" >> Podfile

      - name: 🍎 Pod install
        run: pod install --repo-update
        working-directory: ios

      - name: 🏗️ Build iOS Archive (Native Flutter Command)
        # Generates a flawless Runner.xcarchive natively within Flutter tooling
        # Skips only the final codesign step
        run: flutter build ipa --release --no-codesign --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: 🔍 Verify built archive
        run: |
          APP_PATH="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          if [ -d "$APP_PATH" ]; then
            echo "✅ Runner.app found in archive!"
            du -sh "$APP_PATH"
            ls -la "$APP_PATH/Frameworks" || echo "No Frameworks folder"
          else
            echo "❌ Runner.app not found!"
            find build/ios/archive -type d
            exit 1
          fi

      - name: 📦 Package unsigned IPA
        run: |
          APP_PATH="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          mkdir -p Payload
          # Copy the Runner.app cleanly. Using -RL resolves all symlinks into hard copies
          # ensuring no "alias" files break Sideloadly.
          cp -RL "$APP_PATH" Payload/
          
          # Force inject standard frameworks if missing or symlinked out
          mkdir -p Payload/Runner.app/Frameworks
          
          echo "Checking App.framework inside Payload..."
          if [ ! -d "Payload/Runner.app/Frameworks/App.framework" ]; then
            echo "Manually copying App.framework..."
            cp -RL build/ios/Release-iphoneos/App.framework Payload/Runner.app/Frameworks/ || true
          fi
          
          echo "Checking Flutter.framework inside Payload..."
          if [ ! -d "Payload/Runner.app/Frameworks/Flutter.framework" ]; then
            echo "Manually copying Flutter.framework..."
            cp -RL build/ios/Release-iphoneos/Flutter.framework Payload/Runner.app/Frameworks/ || true
          fi
          
          echo "✅ Pre-zip Payload Size:"
          du -sh Payload/Runner.app
          ls -lh Payload/Runner.app/Frameworks/ || true

          # Create the IPA
          zip -qr PureMusic-unsigned.ipa Payload
          
          mkdir -p build/ios/ipa
          mv PureMusic-unsigned.ipa build/ios/ipa/
          echo "✅ Final IPA size:"
          ls -lh build/ios/ipa/

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PureMusic-unsigned-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 14
