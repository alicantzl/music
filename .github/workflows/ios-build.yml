name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Flutter pub get (Generates Podfile)
        run: flutter pub get

      - name: 🍎 Set iOS 14.0 & Disable CocoaPods Stats
        working-directory: ios
        run: |
          # The Podfile is auto-generated by flutter pub get
          # Update the platform version to iOS 14.0 (for audio_service)
          sed -i '' "s/^# platform :ios.*/platform :ios, '14.0'/g" Podfile
          # Speed up build by avoiding network syncs
          echo "ENV['COCOAPODS_DISABLE_STATS'] = 'true'" >> Podfile

      - name: 🍎 Pod install
        run: pod install --repo-update
        working-directory: ios

      - name: 🏗️ Build iOS App Folder (Native Flutter Command)
        # We use 'build ios' instead of 'build ipa' because it's more reliable for unsigned builds.
        run: flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: 📦 Package unsigned IPA (Kesin Çözüm)
        run: |
          # 1. Create Payload folder
          mkdir -p Payload
          
          # 2. Critical Step: Copy the .app into Payload.
          # -H follows command line links.
          # -L follows ALL links in the source (converts symlinks to real files).
          # -R is recursive.
          # This is what prevents the 6MB "empty shell" problem.
          cp -HLR build/ios/iphoneos/Runner.app Payload/
          
          # 3. Size Verification for Logs
          echo "✅ Frameworks Integrity Check:"
          du -sh Payload/Runner.app/Frameworks/*
          
          # 4. Zip it
          zip -qr PureMusic-unsigned.ipa Payload
          
          # 5. Output
          mkdir -p build/ios/ipa
          mv PureMusic-unsigned.ipa build/ios/ipa/
          echo "✅ Final IPA Created. Size:"
          ls -lh build/ios/ipa/

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PureMusic-unsigned-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 14
