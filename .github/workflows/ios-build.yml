name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Flutter pub get (Generates Podfile)
        run: flutter pub get

      - name: 🍎 Set iOS 14.0 & Disable CocoaPods Stats
        working-directory: ios
        run: |
          # The Podfile is auto-generated by flutter pub get
          # Update the platform version to iOS 14.0 (for audio_service)
          sed -i '' "s/^# platform :ios.*/platform :ios, '14.0'/g" Podfile
          # Speed up build by avoiding network syncs
          echo "ENV['COCOAPODS_DISABLE_STATS'] = 'true'" >> Podfile
          
          # Force CocoaPods targets to disable code signing by injecting into the existing post_install block
          python3 -c "
          content = open('Podfile', 'r').read()
          replacement = '''flutter_additional_ios_build_settings(target)
                target.build_configurations.each do |config|
                  config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                  config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                end'''
          content = content.replace('flutter_additional_ios_build_settings(target)', replacement)
          open('Podfile', 'w').write(content)
          "

      - name: 🍎 Pod install
        run: pod install --repo-update
        working-directory: ios

      - name: 🏗️ Build iOS App Folder (Native Flutter Command)
        run: |
          # Kill Xcode's code-signing enforcement at the source
          python3 -c "
          path = 'ios/Runner.xcodeproj/project.pbxproj'
          content = open(path, 'r').read()
          content = content.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
          content = content.replace('\"CODE_SIGN_IDENTITY[sdk=iphoneos*]\" = \"iPhone Developer\";', 'CODE_SIGN_IDENTITY = \"\";\n\t\t\t\t\"CODE_SIGN_IDENTITY[sdk=iphoneos*]\" = \"\";')
          content = content.replace('CODE_SIGN_IDENTITY = \"iPhone Developer\";', 'CODE_SIGN_IDENTITY = \"\";')
          open(path, 'w').write(content)
          "
          
          # Inject code-signing suppression directly into the Flutter XCConfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "EXPANDED_CODE_SIGN_IDENTITY=\"\"" >> ios/Flutter/Release.xcconfig
          
          # 1. Let Flutter compile Dart and prepare everything it can. It might fail at the final code signing step, which is fine.
          flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/app/outputs/symbols || echo 'Flutter build finished Dart compilation.'
          
          # 2. Finish the build natively forcing Xcode to bypass code signing completely
          cd ios
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" EXPANDED_CODE_SIGN_IDENTITY=""
          cd ..

      - name: 📦 Package unsigned IPA (Kesin Çözüm)
        run: |
          mkdir -p Payload
          
          # Find where Xcode dumped the built .app file
          APP_PATH=$(find . -name "Runner.app" -type d | grep "iphoneos" | head -n 1)
          echo "Found Runner.app at: $APP_PATH"
          
          # Copy it securely
          cp -HLR "$APP_PATH" Payload/
          
          echo "✅ Frameworks Integrity Check:"
          du -sh Payload/Runner.app/Frameworks/* || echo "No frameworks"
          
          # Zip it up
          zip -qr PureMusic-unsigned.ipa Payload
          
          mkdir -p build/ios/ipa
          mv PureMusic-unsigned.ipa build/ios/ipa/
          echo "✅ Final IPA Created. Size:"
          ls -lh build/ios/ipa/

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PureMusic-unsigned-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 14
