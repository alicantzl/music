name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🧹 Full clean (eliminates stale files)
        run: |
          flutter clean
          rm -rf build/
          rm -rf ios/Pods
          rm -rf ios/.symlinks
          rm -rf ios/Podfile.lock

      - name: 📦 Flutter pub get
        run: flutter pub get

      - name: 🍎 Pod install
        run: |
          cd ios
          pod install --repo-update

      - name: 🏗️ Build iOS (no codesign)
        run: |
          # Inject code-signing suppression
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo 'EXPANDED_CODE_SIGN_IDENTITY=""' >> ios/Flutter/Release.xcconfig
          
          flutter build ios --release --no-codesign || true
          
          # Fallback: raw xcodebuild if flutter build didn't produce the .app
          if [ ! -d "build/ios/iphoneos/Runner.app" ]; then
            cd ios
            xcodebuild build \
              -workspace Runner.xcworkspace \
              -scheme Runner \
              -configuration Release \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              EXPANDED_CODE_SIGN_IDENTITY=""
            cd ..
          fi

      - name: 📦 Package unsigned IPA
        run: |
          mkdir -p Payload
          
          APP_PATH=$(find . -name "Runner.app" -type d | grep -E "(iphoneos|Release)" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Runner.app not found!"
            exit 1
          fi
          echo "Found Runner.app at: $APP_PATH"
          
          cp -HLR "$APP_PATH" Payload/
          zip -qr PureMusic-unsigned.ipa Payload
          
          mkdir -p build/ios/ipa
          mv PureMusic-unsigned.ipa build/ios/ipa/
          echo "✅ Final IPA Created."
          ls -lh build/ios/ipa/

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PureMusic-unsigned-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 14
